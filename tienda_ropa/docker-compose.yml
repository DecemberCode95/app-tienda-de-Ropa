version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: tienda_ropa_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${DB_NAME:-tienda_ropa_db}
      POSTGRES_USER: ${DB_USER:-tienda_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tienda_password}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tienda_user} -d ${DB_NAME:-tienda_ropa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tienda_network
    restart: unless-stopped

  # Aplicación Django
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tienda_ropa_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 2 config.wsgi:application"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - logs_volume:/app/logs
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=${DEBUG:-False}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tienda_network
    restart: unless-stopped

  # Nginx como reverse proxy (opcional, para producción)
  nginx:
    image: nginx:alpine
    container_name: tienda_ropa_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    networks:
      - tienda_network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  logs_volume:
    driver: local

networks:
  tienda_network:
    driver: bridge
